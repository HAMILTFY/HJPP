<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>★.HJ++ Official Site.★</title>

    <!-- Google Verification -->
    <meta name="google-site-verification" content="e1YAogHoLTLXSC7RxrCtV8QdvQ1V6yfcG-eFf-IvxII" />

    <!-- فونت فارسی -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;

            /* پس‌زمینهٔ گرادیانی متحرک */
            background: linear-gradient(135deg, #0d47a1, #1565c0, #1e88e5);
            background-size: 300% 300%;
            animation: bgMove 12s ease infinite;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* هدر */
        .header {
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            left: 0;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .nav a {
            margin-left: 20px;
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        /* جعبهٔ شیشه‌ای */
        .box {
            background: rgba(255, 255, 255, 0.12);
            padding: 35px 45px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 35px rgba(0,0,0,0.25), 0 0 15px #2196f3;
            animation: fadeIn 1.2s ease;
            margin-top: 100px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            word-wrap: break-word;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <!-- هدر -->
    <header class="header">
        <div class="logo">HJ++</div>
        <nav class="nav">
            <a href="#">Home</a>
            <a href="#">Docs</a>
            <a href="#">About</a>
            <a href="#">Ecosystem</a>
        </nav>
    </header>

    <!-- محتوای اصلی -->
    <div class="box">
        <h1>★ HJ++ Official Portal ★</h1>
        <p>زبان برنامه‌نویسی سخت، فلسفی و اختصاصی</p>
        <p>SihhTec • SIHH CODE • SIHH ENGINE • ™LTKROS</p>
    </div>

</body>
</html>
