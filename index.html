<!DOCTYPE html>
<html lang="fa">
<head>

    <!-- Google Verification -->

    <!-- مهم‌ترین خط برای موبایل -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- فونت فارسی -->
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Vazirmatn', sans-serif;
            color: white;
            min-height: 100vh;
            background: linear-gradient(135deg, #0d47a1, #1565c0, #1e88e5);
            background-size: 300% 300%;
            animation: bgMove 12s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            width: 100%;
            max-width: 700px;
            padding: 20px 16px 40px 16px;
            margin-top: 30px;
        }

        .title-box {
            background: rgba(255, 255, 255, 0.14);
            border-radius: 18px;
            padding: 24px 18px;
            backdrop-filter: blur(14px);
            box-shadow: 0 0 25px rgba(0,0,0,0.25), 0 0 10px #2196f3;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 10px 0;
        }

        p {
            margin: 6px 0;
            font-size: 1.05rem;
            opacity: 0.95;
        }

        .sub {
            margin-top: 14px;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; line-height: 2.1rem; }
            p { font-size: 0.95rem; }
            .title-box { padding: 20px 14px; }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="title-box">
            <h1>★ HJ++ Official Portal ★</h1>
            <p>زبان برنامه‌نویسی سخت، فلسفی و اختصاصی</p>
            <p>SihhTec • SIHH CODE • SIHH ENGINE • ™LTKROS</p>
            <p class="sub">Official entry point to the HJ++ ecosystem.</p>
        </div>
    </div>

</body>
</html>
